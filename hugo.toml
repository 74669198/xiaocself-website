baseURL = 'https://xiaocself.top'
languageCode = 'zh-CN'
title = '小c的自我修养'
theme = 'PaperMod'

[params]
  author = '小c'
  description = 'Claude Code 实战经验分享 | AI工具配置指南 | 效率提升技巧'
  keywords = ['Claude Code', 'AI工具', '效率提升', '自动化', '微信机器人']
  defaultTheme = 'dark'
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false

  [params.homeInfoParams]
    Title = "Hi, I'm 小c 👋"
    Content = "这里记录我与 Claude Code 的故事——从入门到精通，从配置到实战，从个人效率到团队协作。目标是让每个人都能用好 AI 工具，提升10倍效率。"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/xiaocself"

  [[params.socialIcons]]
    name = "twitter"
    url = "https://twitter.com/xiaocself"

[params.assets]
  favicon = "/favicon.ico"
  favicon16x16 = "/favicon-16x16.png"
  favicon32x32 = "/favicon-32x32.png"
  apple_touch_icon = "/apple-touch-icon.png"
  safari_pinned_tab = "/safari-pinned-tab.svg"
  disableHLJS = false

[params.seo]
  enableRobotsTXT = true
  noindex = false

[[menu.main]]
  identifier = 'home'
  name = '首页'
  url = '/'
  weight = 10

[[menu.main]]
  identifier = 'tutorials'
  name = '教程'
  url = '/tutorials/'
  weight = 20

[[menu.main]]
  identifier = 'cases'
  name = '案例'
  url = '/cases/'
  weight = 30

[[menu.main]]
  identifier = 'tools'
  name = '工具'
  url = '/tools/'
  weight = 40

[[menu.main]]
  identifier = 'about'
  name = '关于'
  url = '/about/'
  weight = 50

[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]

[outputFormats]
  [outputFormats.RSS]
    mediatype = "application/rss"
    baseName = "index"

[sitemap]
  changefreq = 'weekly'
  filename = 'sitemap.xml'
  priority = 0.5

[markup.goldmark.renderer]
  unsafe = true
