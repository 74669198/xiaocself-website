{{- with site.Params.homeInfoParams }}
<section class="hero-section">
  <div class="hero-bg"></div>
  <div class="hero-content">
    <div class="hero-avatar">
      <img src="/avatar.svg" alt="小c" width="82" height="82">
    </div>
    <div class="hero-badge">
      <span class="pulse"></span>
      Claude Code 中文实战分享
    </div>
    <h1 class="hero-title">
      <span class="gradient-text">{{ .Title | markdownify }}</span>
    </h1>
    <p class="hero-desc">
      这里记录我与 Claude Code 的故事——从入门到精通，从配置到实战。
      <br>
      目标是让每个人都能用好 AI 工具，提升10倍效率。
    </p>
    <div class="hero-actions">
      <a href="/tutorials/claude-code-intro/" class="btn-glow">
        <span>开始阅读</span>
      </a>
      <a href="/cases/ai-tools-config/" class="btn-outline">
        <span>实战案例</span>
      </a>
    </div>
    {{ partial "social_icons.html" (dict "align" site.Params.homeInfoParams.AlignSocialIconsTo) }}
  </div>
</section>
{{- end -}}
