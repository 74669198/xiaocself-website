{{- $pageurl := .Permalink }}
{{- $title := .Title }}

<div class="share-section">
  <span class="share-label">觉得有用？分享给朋友</span>
  <div class="share-buttons">
    <a class="share-btn share-x" target="_blank" rel="noopener noreferrer"
       href="https://x.com/intent/tweet/?text={{ $title }}&amp;url={{ $pageurl }}"
       aria-label="分享到 X">
      <svg viewBox="0 0 24 24" fill="currentColor" height="18" width="18">
        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
      </svg>
      <span>分享到 X</span>
    </a>
    <button class="share-btn share-copy" onclick="navigator.clipboard.writeText('{{ $pageurl }}').then(() => { this.classList.add('copied'); this.querySelector('span').textContent = '已复制'; setTimeout(() => { this.classList.remove('copied'); this.querySelector('span').textContent = '复制链接'; }, 2000); })"
       aria-label="复制链接">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
      </svg>
      <span>复制链接</span>
    </button>
  </div>
</div>
